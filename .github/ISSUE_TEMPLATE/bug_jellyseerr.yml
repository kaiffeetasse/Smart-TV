name: "Bug: Jellyseerr"
description: Report a Jellyseerr integration issue
title: "[Jellyseerr] "
labels: ["bug", "jellyseerr"]
body:
  - type: input
    id: app_version
    attributes:
      label: Moonfin version
      description: The app version / release tag (e.g., v2.0.0)
      placeholder: v2.0.0
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Tizen (Samsung)
        - webOS (LG)
    validations:
      required: true

  - type: input
    id: platform_version
    attributes:
      label: Platform version
      description: "Tizen example: Tizen 4 / 5.0 / 6.5 / 7.0 \nwebOS example: webOS 4 / 6.x / 23 / 24"
      placeholder: e.g. Tizen 6.5 or webOS 23
    validations:
      required: true

  - type: input
    id: tv_model
    attributes:
      label: TV model
      description: "Samsung example: UN55TU8000 \nLG example: OLED55C1PUA"
    validations:
      required: false

  - type: dropdown
    id: connection_type
    attributes:
      label: How are you connecting?
      options:
        - Local network (http://IP:5055)
        - Domain + reverse proxy
        - Remote access (port forward)
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: https
    attributes:
      label: Using HTTPS?
      options:
        - "Yes"
        - "No"
        - "Not sure"
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error message / what happens
      placeholder: |
        "Failed to connect..." / spinner / auth loop / blank page / etc.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true

  - type: dropdown
    id: works_elsewhere
    attributes:
      label: Does Jellyseerr work from a phone/PC browser on the same network?
      options:
        - "Yes"
        - "No"
        - "Haven't tried"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / extra context (optional)
    validations:
      required: false
